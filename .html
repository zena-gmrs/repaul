<!DOCTYPE html> <html> <head> <title>DANTE PRESENCE</title> <style> body{ margin:0; background:black; overflow:hidden; font-family:monospace; }

canvas{
position:fixed;
top:0;
left:0;
}

.ui{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:red;
}

h1{
font-size:60px;
text-shadow:0 0 20px red;
animation:flicker 0.2s infinite;
}

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}
}
</style>

</head> <body>

<canvas id="c"></canvas>

<div class="ui"> <h1>DANTE</h1> <p>devil trigger active</p> </div> <script> const c=document.getElementById("c"); const ctx=c.getContext("2d"); c.width=window.innerWidth; c.height=window.innerHeight; let t=0; function draw(){ ctx.fillStyle="rgba(0,0,0,0.15)"; ctx.fillRect(0,0,c.width,c.height); // aura circle let x=c.width/2; let y=c.height/2; for(let i=0;i<100;i++){ let angle=i*0.2+t; let r=120+Math.sin(t*3+i)*30; let px=x+Math.cos(angle)*r; let py=y+Math.sin(angle)*r; ctx.fillStyle="rgba(255,0,0,0.7)"; ctx.fillRect(px,py,3,3); } // fake silhouette (Dante shape) ctx.fillStyle="rgba(255,0,0,0.15)"; ctx.beginPath(); ctx.moveTo(x,y-150); ctx.lineTo(x-60,y+120); ctx.lineTo(x,y+80); ctx.lineTo(x+60,y+120); ctx.closePath(); ctx.fill(); // sword slash effect ctx.strokeStyle="red"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,200+Math.sin(t*5)*20,0,Math.PI*2); ctx.stroke(); t+=0.04; requestAnimationFrame(draw); } draw(); </script> </body> </html>
