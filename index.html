<!DOCTYPE html>
<html>
<head>
  <title>HAPPY BIRTHDAY REPAUL</title>

  <style>
    body{
      margin:0;
      background: radial-gradient(circle, #1a0000, black);
      color:#ff0000;
      font-family:Arial;
      overflow:hidden;
      text-align:center;
    }

    .center{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
    }

    h1{
      text-shadow:0 0 15px red;
      margin-bottom:10px;
    }

    button{
      padding:12px 20px;
      background:#ff0000;
      border:none;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    #loading{
      display:none;
      margin-top:15px;
    }

    #bar{
      width:260px;
      height:10px;
      border:1px solid red;
      margin-top:10px;
      display:none;
    }

    #fill{
      height:100%;
      width:0%;
      background:red;
    }

    #scene{
      display:none;
    }

    .row{
      display:flex;
      gap:40px;
      margin-top:20px;
    }

    .card{
      position:relative;
    }

    img{
      width:220px;
      height:280px;
      object-fit:cover;
      border:2px solid red;
      box-shadow:0 0 25px red, 0 0 60px rgba(255,0,0,0.3);
      transition:0.3s;
    }

    img:hover{
      transform:scale(1.05);
      filter:brightness(1.2) contrast(1.2);
    }

    .name{
      margin-top:10px;
      text-shadow:0 0 10px red;
    }

    .glitch{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:red;
      opacity:0;
      pointer-events:none;
    }

    .flash{
      animation:flash 0.6s;
    }

    @keyframes flash{
      0%{opacity:0}
      30%{opacity:0.7}
      100%{opacity:0}
    }

  </style>
</head>

<body>

<div class="center" id="menu">
  <h1>THE DEVIL HUNTER'S GIRLFRIEND BIRTHDAY</h1>
  <button onclick="start()">START</button>

  <div id="loading">unlocking devil trigger...</div>
  <div id="bar"><div id="fill"></div></div>
</div>

<div class="center" id="scene">
  <h1>MISSION COMPLETE</h1>
  <p>TWO LOVERS DEMON HUNTERS</p>

  <div class="row">
    <div class="card">
      <img src="dante.jpg">
      <div class="name">DANTE</div>
    </div>

    <div class="card">
      <img src="rempong.jpeg">
      <div class="name">PACAR DANTE</div>
    </div>
  </div>
</div>

<div class="glitch" id="glitch"></div>

<script>
function start(){
  document.getElementById("loading").style.display="block";
  document.getElementById("bar").style.display="block";

  let fill = document.getElementById("fill");
  let w = 0;

  let load = setInterval(()=>{
    w += 2;
    fill.style.width = w + "%";

    if(w >= 100){
      clearInterval(load);

      document.getElementById("glitch").classList.add("flash");

      setTimeout(()=>{
        document.getElementById("menu").style.display="none";
        document.getElementById("scene").style.display="flex";
      }, 600);
    }
  }, 25);
}
</script>

</body>
</html>
